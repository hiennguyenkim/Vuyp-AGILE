<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Danh sách sự kiện - HCMUE</title>
    <link rel="stylesheet" href="../../assets/css/core/base.css" />
    <link rel="stylesheet" href="../../assets/css/core/theme.css" />
    <link rel="stylesheet" href="../../assets/css/core/components.css" />
    <link rel="stylesheet" href="../../assets/css/pages/events.css" />
  </head>

  <section class="qr-section" style="margin: 20px 0; text-align: center">
    <h2>Quét mã QR</h2>
    <video
      id="camera"
      style="width: 320px; border-radius: 8px"
      autoplay
    ></video>
    <p
      id="qr-result"
      style="margin-top: 10px; font-size: 18px; color: green"
    ></p>
  </section>

  <body>
    <main class="page-shell events-shell">
      <section class="surface-card events-panel">
        <header class="events-header">
          <div class="events-brand">
            <img
              src="../../assets/images/hcmue.png"
              alt="HCMUE"
              class="brand-logo"
            />
            <div class="events-copy">
              <p class="section-eyebrow">
                CLB sự kiện - Đại học Sư phạm TP.HCM
              </p>
              <h1>Danh sách sự kiện</h1>
              <span class="events-subtitle"
                >Theo dõi hoạt động đang mở và truy cập nhanh vào luồng đăng
                ký.</span
              >
            </div>
          </div>

          <div class="header-actions">
            <span id="entryStatus" class="pill entry-status"
              >Đang xem công khai</span
            >
            <a
              id="entryActionLink"
              href="../auth/login.html"
              class="detail-btn"
            >
              Đăng nhập
            </a>
          </div>
        </header>

        <section class="events-table-card">
          <div class="table-wrap">
            <table class="data-table event-table">
              <thead>
                <tr>
                  <th>Mã sự kiện</th>
                  <th>Tên sự kiện</th>
                  <th>Thời gian</th>
                  <th>Địa điểm</th>
                  <th>Hành động</th>
                </tr>
              </thead>
              <tbody id="event-list"></tbody>
            </table>
          </div>
        </section>

        <div class="events-footer">
          <span>Đại học Sư phạm Thành phố Hồ Chí Minh</span>
        </div>
      </section>
    </main>

    <script src="../../assets/js/core/storage.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/pages/events.js"></script>

    <script type="module">
      import QrScanner from "https://cdn.jsdelivr.net/npm/qr-scanner@1.4.2/qr-scanner.min.js";

      const videoElem = document.getElementById("camera");
      const resultElem = document.getElementById("qr-result");

      if (!videoElem) {
        console.error(
          "❌ Không tìm thấy thẻ video #camera — không thể quét QR",
        );
      } else {
        const scanner = new QrScanner(
          videoElem,
          (result) => {
            console.log("Đã quét:", result);
            resultElem.textContent = "Đã quét: " + result;

            // bạn có thể chuyển trang, gửi API... tại đây
          },
          {
            highlightScanRegion: true,
            highlightCodeOutline: true,
          },
        );

        scanner
          .start()
          .then(() => console.log("📸 Camera đã sẵn sàng"))
          .catch((err) => console.error("Lỗi camera:", err));
      }
    </script>
  </body>
</html>
