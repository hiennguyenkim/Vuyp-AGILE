<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Quản lý sự kiện</title>
  </head>

  <body>
    <h1>Quản lý sự kiện</h1>

    <div class="form-container">
      <h2>Chỉnh sửa sự kiện</h2>

      <div id="error" class="error"></div>
      <div id="success" class="success"></div>

      <form id="eventForm">
        <input type="hidden" id="eventIndex" />

        <label>Tên sự kiện <span class="required">*</span></label>
        <input type="text" id="name" />

        <label>Mô tả</label>
        <textarea id="description"></textarea>

        <label>Diễn giả</label>
        <input type="text" id="speaker" />

        <label>Thời gian bắt đầu <span class="required">*</span></label>
        <input type="datetime-local" id="start" />

        <label>Thời gian kết thúc <span class="required">*</span></label>
        <input type="datetime-local" id="end" />

        <label>Địa điểm <span class="required">*</span></label>
        <input type="text" id="location" />

        <label>Số lượng tối đa <span class="required">*</span></label>
        <input type="number" id="max" />

        <div style="display: flex; gap: 10px;">
          <button type="submit">Lưu</button>
          <button type="button" id="btnDeleteDetail" class="delete-btn" style="display: none;" onclick="deleteFromDetail()">Xóa</button>
        </div>
      </form>
    </div>

    <h2>Danh sách sự kiện</h2>

    <table>
      <thead>
        <tr>
          <th>Tên</th>
          <th>Thời gian</th>
          <th>Địa điểm</th>
          <th>Hành động</th>
        </tr>
      </thead>

      <tbody id="eventList"></tbody>
    </table>

    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <p>Bạn chắc chắn muốn xóa sự kiện này?</p>

        <div class="modal-buttons">
          <button id="confirmDelete">Xóa</button>
          <button id="cancelDelete">Hủy</button>
        </div>
      </div>
    </div>

    <link rel="stylesheet" href="CSS/Admin.css" />
    <script src="JS/Admin.js"></script>

    <div id="toast" class="toast"></div>
  </body>
</html>
