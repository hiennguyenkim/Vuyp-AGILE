<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đánh giá sự kiện</title>

<style>
body {
    font-family: "Segoe UI", Arial;
    margin: 0;
    background: #f4f6f9;
}

/* HERO */
.hero {
    width: 100%;
    height: 50vh;
    background: url("event.png") center/cover no-repeat;
    position: relative;
}

.hero::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 58, 143, 0.75);
}

.event-info {
    position: absolute;
    bottom: 30px;
    left: 50px;
    color: white;
    z-index: 1;
}

/* MAIN */
.container {
    width: 60%;
    margin: 30px auto;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BUTTON */
.btn {
    background: #003A8F;
    color: white;
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.btn:hover {
    background: #C8102E;
}

/* REVIEW */
.review-card {
    background: white;
    padding: 15px;
    margin-top: 15px;
    border-radius: 6px;
    border-left: 5px solid #003A8F;
}

.stars {
    color: #f4b400;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 20px;
    width: 350px;
    border-radius: 6px;
    border-top: 5px solid #003A8F;
}

.close {
    float: right;
    cursor: pointer;
    color: #C8102E;
}

/* ⭐ FIX STAR CHUẨN */
.star-input {
    display: flex;
    flex-direction: row-reverse;
    justify-content: flex-start;
}

.star-input input {
    display: none; /* Ẩn radio */
}

.star-input label {
    font-size: 30px;
    color: #ccc;
    cursor: pointer;
}

/* Hover + chọn */
.star-input label:hover,
.star-input label:hover ~ label,
.star-input input:checked ~ label {
    color: #f4b400;
}

/* TEXTAREA */
textarea {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    border-radius: 4px;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div class="event-info">
        <h1>Hội thảo Công nghệ AI 2026</h1>
        <p>📍 HCMUE</p>
        <p>📅 20/04/2026</p>
    </div>
</div>

<div class="container">

    <div class="top-bar">
        <h3>Đánh giá từ sinh viên</h3>
        <button class="btn" onclick="openModal()">Viết đánh giá</button>
    </div>

    <div id="reviews">
        <div class="review-card">
            <div class="stars">★★★★★</div>
            <p>Sự kiện cực kỳ chất lượng!</p>
        </div>

        <div class="review-card">
            <div class="stars">★★★★☆</div>
            <p>Ổn nhưng cần cải thiện âm thanh.</p>
        </div>
    </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">×</span>
        <h3>Gửi đánh giá</h3>

        <!-- ⭐ FIXED -->
        <div class="star-input">
            <input type="radio" id="star5" name="rating" value="5"><label for="star5">★</label>
            <input type="radio" id="star4" name="rating" value="4"><label for="star4">★</label>
            <input type="radio" id="star3" name="rating" value="3"><label for="star3">★</label>
            <input type="radio" id="star2" name="rating" value="2"><label for="star2">★</label>
            <input type="radio" id="star1" name="rating" value="1"><label for="star1">★</label>
        </div>

        <textarea id="content" placeholder="Nhập góp ý (không bắt buộc)"></textarea>

        <input type="file">

        <button class="btn" onclick="submitReview()">Gửi</button>
    </div>
</div>

<script>
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function submitReview() {
    const ratings = document.getElementsByName("rating");
    let selected = null;

    ratings.forEach(r => {
        if (r.checked) selected = r.value;
    });

    if (!selected) {
        alert("Vui lòng chọn số sao!");
        return;
    }

    const content = document.getElementById("content").value;

    const review = document.createElement("div");
    review.className = "review-card";

    let stars = "★★★★★☆☆☆☆☆".slice(5 - selected, 10 - selected);

    review.innerHTML = `
        <div class="stars">${stars}</div>
        <p>${content || "Không có nội dung"}</p>
    `;

    document.getElementById("reviews").prepend(review);

    alert("Cảm ơn bạn đã gửi đánh giá!");

    closeModal();

    document.getElementById("content").value = "";
    ratings.forEach(r => r.checked = false);
}
</script>

</body>
</html>
